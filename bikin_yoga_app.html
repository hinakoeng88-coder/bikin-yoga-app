<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Bikin Yoga">
<title>Bikin Yoga</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pk:#e8789a;--pkl:#fde8ef;--pkd:#c4527a;--v:#b56088;--vl:#fae8f2;--bg:#fff5f8;--card:#fff;--surf:#fef0f4;--bd:#f5c8d8;--tx:#3d2030;--mu:#a07080}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--tx);max-width:390px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border-bottom:.5px solid var(--bd);position:sticky;top:0;z-index:10}
.logo{font-size:17px;font-weight:500;color:var(--pk)}.logo em{font-style:normal;color:var(--pkd)}
.hdr-r{display:flex;align-items:center;gap:8px}
.spill{background:var(--pkl);color:var(--pkd);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap}
.spbtn{background:none;border:.5px solid var(--bd);border-radius:6px;padding:3px 7px;font-size:13px;cursor:pointer;color:var(--mu);line-height:1}
.content{flex:1;overflow-y:auto;padding-bottom:64px;-webkit-overflow-scrolling:touch}
.sec{display:none}.sec.on{display:block}
.btabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;display:flex;background:var(--card);border-top:.5px solid var(--bd);z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;cursor:pointer;color:var(--mu);font-size:10px;gap:3px}
.btab-icon{font-size:18px;line-height:1}
.btab.on{color:var(--pk)}
.cbody{padding:10px 8px 12px;background:var(--bg)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dow{text-align:center;font-size:10px;color:var(--mu);padding:3px 0;font-weight:500}
.cell{border:.5px solid var(--bd);border-radius:6px;height:56px;padding:3px 4px;cursor:pointer;background:var(--card);overflow:hidden;position:relative;transition:transform .1s}
.cell:active{transform:scale(.94)}
.cell.emp{background:transparent;border-color:transparent;cursor:default;pointer-events:none}
.cell.today{border-color:var(--pk);border-width:1.5px}
.cell.hasv{background:var(--pkl)}
.cell.cdone{background:#f5b8cc}
.dn{font-size:10px;font-weight:500;color:var(--mu);line-height:1}
.cell.today .dn{color:var(--pk)}
.vnms{margin-top:2px;display:flex;flex-direction:column;gap:1px}
.vn{font-size:8px;color:var(--pkd);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.ck{position:absolute;top:2px;right:3px;font-size:11px;color:var(--pkd);font-weight:500}
.cal-sep{height:.5px;background:var(--bd);margin:16px 8px 0}
.cal-month-lbl{padding:12px 0 4px;text-align:center;font-size:12px;font-weight:500;color:var(--pkd)}
.ov-wrap{position:fixed;inset:0;background:rgba(100,30,60,.35);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov-wrap.show{display:flex}
.sheet{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:390px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:up .22s ease}
@keyframes up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.sh-handle{width:34px;height:4px;background:var(--bd);border-radius:2px;margin:10px auto 0}
.sh-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:.5px solid var(--bd)}
.sh-ttl{font-size:15px;font-weight:500;color:var(--pkd)}
.shx{background:var(--surf);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:15px;color:var(--mu);display:flex;align-items:center;justify-content:center}
.sh-body{padding:12px 14px 36px}
.vcard{background:var(--surf);border-radius:12px;padding:12px;margin-bottom:10px}
.vcard-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bynum{font-size:11px;font-weight:500;color:var(--pkd);background:var(--pkl);padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.bynum-plus{font-size:11px;font-weight:500;color:var(--v);background:#fce8f5;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.vtitle{font-size:13px;flex:1;line-height:1.4;color:var(--tx);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chk-grp{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:auto}
.mychk{accent-color:var(--pk);width:18px;height:18px;cursor:pointer;flex-shrink:0}
.mymin{width:44px;border:.5px solid var(--bd);border-radius:6px;padding:4px;font-size:12px;color:var(--tx);background:var(--card);outline:none;text-align:center;font-family:-apple-system,sans-serif}
.mymin:focus{border-color:var(--pk)}
.min-lbl{font-size:11px;color:var(--mu);flex-shrink:0}
.ytbtn{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--card);border:.5px solid var(--bd);border-radius:10px;padding:11px 0;width:100%;font-size:14px;font-weight:500;color:var(--tx);font-family:-apple-system,sans-serif;text-decoration:none}
.ytbtn:active{opacity:.8}
.ytred{color:#e52d27;font-size:16px}
.url-input{width:100%;border:.5px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--tx);background:var(--card);outline:none;font-family:-apple-system,sans-serif;display:block}
.url-input:focus{border-color:var(--pk)}
.ltab{padding:14px 14px 20px;background:var(--bg)}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.sbox{background:var(--card);border:.5px solid var(--bd);border-radius:10px;padding:12px;text-align:center}
.sv{font-size:20px;font-weight:500;color:var(--pkd)}
.sl2{font-size:10px;color:var(--mu);margin-top:2px}
.litem{background:var(--card);border:.5px solid var(--bd);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--pk);flex-shrink:0}
.lmain{flex:1;min-width:0}
.lvid{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lmins{font-size:18px;font-weight:500;color:var(--pkd)}
.lminl{font-size:9px;color:var(--mu)}
.dh{font-size:11px;color:var(--mu);margin:12px 0 5px;border-bottom:.5px solid var(--bd);padding-bottom:3px}
.vtab{padding:12px 14px 20px;background:var(--bg)}
#vc-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:12px;width:100%}
#kw-input{border:.5px solid var(--bd);border-radius:8px;padding:9px 10px;font-size:13px;color:var(--tx);background:var(--card);outline:none;font-family:-apple-system,sans-serif}
#kw-input:focus{border-color:var(--pk)}
#note-sel{border:.5px solid var(--bd);border-radius:8px;padding:9px 4px;font-size:11px;color:var(--tx);background:var(--card);outline:none;font-family:-apple-system,sans-serif;-webkit-appearance:none;text-align:center;cursor:pointer}
#add-btn{background:var(--pk);color:#fff;border:none;border-radius:8px;padding:9px 12px;font-size:13px;cursor:pointer;font-family:-apple-system,sans-serif;white-space:nowrap;flex-shrink:0}
.vcd{background:var(--card);border:.5px solid var(--bd);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.vcmeta{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.vcep{font-size:11px;font-weight:500;color:var(--v);background:var(--vl);padding:2px 8px;border-radius:10px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vcdate{font-size:11px;color:var(--mu)}
.note-on{font-size:10px;background:var(--pkl);color:var(--pkd);padding:2px 8px;border-radius:10px;font-weight:500}
.note-off{font-size:10px;background:var(--surf);color:var(--mu);padding:2px 8px;border-radius:10px}
.vcbody{font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:8px;color:var(--tx)}
.vc-link-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.vc-link-btn{display:inline-flex;align-items:center;gap:4px;border:.5px solid var(--bd);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:500;text-decoration:none;background:var(--surf)}
.vc-link-btn.lvoicy{color:var(--v)}
.vc-link-btn.lnote{color:#2e9e6e}
.vcact{display:flex;justify-content:flex-end;gap:8px;padding-top:8px;border-top:.5px solid var(--bd)}
.vcedit-btn{background:none;border:.5px solid var(--bd);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--mu);font-family:-apple-system,sans-serif}
.vcdel{background:none;border:none;cursor:pointer;font-size:11px;color:var(--mu);font-family:-apple-system,sans-serif}
.vff{margin-bottom:8px}
.vff label{display:block;font-size:11px;color:var(--mu);margin-bottom:3px}
.vff input,.vff textarea{width:100%;border:.5px solid var(--bd);border-radius:8px;padding:9px 10px;font-size:13px;color:var(--tx);background:var(--surf);outline:none;font-family:-apple-system,sans-serif;-webkit-appearance:none}
.vff textarea{resize:none;height:110px;line-height:1.6}
.vff input:focus,.vff textarea:focus{border-color:var(--pk)}
.vf2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vcsave{background:var(--pk);color:#fff;border:none;border-radius:8px;padding:12px 0;width:100%;font-size:14px;font-weight:500;cursor:pointer;font-family:-apple-system,sans-serif;margin-top:6px}
.spsec{margin-bottom:20px}
.spttl{font-size:11px;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.spf{margin-bottom:8px}
.spf label{display:block;font-size:12px;color:var(--mu);margin-bottom:3px}
.spf input,.spf textarea{width:100%;border:.5px solid var(--bd);border-radius:8px;padding:9px 10px;font-size:13px;color:var(--tx);background:var(--surf);outline:none;font-family:-apple-system,sans-serif;-webkit-appearance:none}
.spf textarea{resize:none;height:110px;font-size:12px;line-height:1.5}
.spadd{background:var(--pk);color:#fff;border:none;border-radius:8px;padding:12px 0;width:100%;font-size:13px;font-weight:500;cursor:pointer;font-family:-apple-system,sans-serif;margin-top:4px}
.sprst{background:#e24b4a;color:#fff;border:none;border-radius:8px;padding:12px 0;width:100%;font-size:13px;font-weight:500;cursor:pointer;font-family:-apple-system,sans-serif;margin-top:4px}
.sphint{font-size:11px;color:var(--mu);line-height:1.65;background:var(--surf);border-radius:8px;padding:10px;margin-top:8px}
.spml{display:flex;flex-direction:column;gap:6px}
.spmi{display:flex;align-items:center;justify-content:space-between;background:var(--surf);border-radius:8px;padding:9px 12px;font-size:13px}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">Bikin <em>Yoga</em></div>
  <div class="hdr-r">
    <div class="spill" id="streak">🔥 0日連続</div>
    <button class="spbtn" onclick="openSP()">⚙️</button>
  </div>
</div>
<div class="content">
  <div class="sec on" id="sec-cal"><div class="cbody" id="cbody"></div></div>
  <div class="sec" id="sec-log"><div class="ltab"><div class="srow" id="stats"></div><div id="loglist"></div></div></div>
  <div class="sec" id="sec-voicy">
    <div class="vtab">
      <div id="vc-toolbar">
        <input id="kw-input" placeholder="キーワードで検索…" oninput="renderVC()">
        <select id="note-sel" onchange="renderVC()">
          <option value="all">全て</option>
          <option value="noted">済み</option>
          <option value="unnoted">未</option>
        </select>
        <button id="add-btn" onclick="openVCForm(null)">＋ 追加</button>
      </div>
      <div id="vc-list"></div>
    </div>
  </div>
</div>
<div class="btabs">
  <div class="btab" id="btab-log" onclick="sw('log',this)"><div class="btab-icon">📊</div><div>記録</div></div>
  <div class="btab on" id="btab-cal" onclick="sw('cal',this)"><div class="btab-icon">📅</div><div>カレンダー</div></div>
  <div class="btab" id="btab-voicy" onclick="sw('voicy',this)"><div class="btab-icon">🎙</div><div>Voicy</div></div>
</div>
<div class="ov-wrap" id="ov-day" onclick="if(event.target===this)closeDay()">
  <div class="sheet"><div class="sh-handle"></div><div class="sh-hdr"><div class="sh-ttl" id="day-ttl"></div><button class="shx" onclick="closeDay()">✕</button></div><div class="sh-body" id="day-body"></div></div>
</div>
<div class="ov-wrap" id="ov-vc" onclick="if(event.target===this)closeVCForm()">
  <div class="sheet"><div class="sh-handle"></div><div class="sh-hdr"><div class="sh-ttl" id="vc-form-ttl">Voicyを記録</div><button class="shx" onclick="closeVCForm()">✕</button></div>
    <div class="sh-body">
      <div class="vf2"><div class="vff"><label>エピソードタイトル</label><input id="vf-ep" placeholder="#123 朝活の話"></div><div class="vff"><label>放送日</label><input id="vf-date" type="date"></div></div>
      <div class="vf2"><div class="vff"><label>放送URL</label><input id="vf-url" placeholder="https://..."></div><div class="vff"><label>note URL</label><input id="vf-note-url" placeholder="https://note.com/..."></div></div>
      <div class="vff"><label>コメント・気づき</label><textarea id="vf-body" placeholder="放送を聴いて感じたこと、残したいコメント…"></textarea></div>
      <button class="vcsave" onclick="saveVCForm()">保存する</button>
    </div>
  </div>
</div>
<div class="ov-wrap" id="ov-sp" onclick="if(event.target===this)closeSP()">
  <div class="sheet"><div class="sh-handle"></div><div class="sh-hdr"><div class="sh-ttl">⚙️ 設定</div><button class="shx" onclick="closeSP()">✕</button></div>
    <div class="sh-body">
      <div class="spsec"><div class="spttl">月別メニューを追加</div><div class="spf"><label>年月</label><input id="sp-ym" placeholder="2026-05"></div><div class="spf"><label>動画データ（1日1行）形式：BY番号,タイトル,URL|…</label><textarea id="sp-data" placeholder="1行目が1日目…30行で30日分"></textarea></div><div class="sphint">💡 来月分のURLをClaudeに送ると貼り付け用データを自動生成します！</div><button class="spadd" onclick="saveMonth()">追加する</button></div>
      <div class="spsec"><div class="spttl">登録済みの月</div><div class="spml" id="sp-mlist"></div></div>
      <div class="spsec"><div class="spttl">データ管理</div><button class="sprst" onclick="resetAll()">すべての記録をリセット</button></div>
    </div>
  </div>
</div>
<script>
function fixToolbar(){
  const tb=document.getElementById('vc-toolbar'),kw=document.getElementById('kw-input'),ns=document.getElementById('note-sel'),ab=document.getElementById('add-btn');
  if(!tb||!kw||!ns||!ab)return;
  const total=tb.offsetWidth,addW=ab.offsetWidth||56,noteW=48,gap=12,kwW=total-addW-noteW-gap;
  kw.style.width=Math.max(80,kwW)+'px';kw.style.flexShrink='0';ns.style.width=noteW+'px';ns.style.flexShrink='0';

  if(!ym||!raw){alert('年月とデータを入力してください');return;}
  const days={};raw.split('\n').filter(l=>l.trim()).forEach((line,i)=>{const vids=line.split('|').map(s=>{const p=s.split(',');return{n:(p[0]||'').trim(),t:(p[1]||'').trim(),u:(p[2]||'').trim()};}).filter(v=>v.n);if(vids.length)days[i+1]=vids;});
  const mns=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const[y,m]=ym.split('-').map(Number);
  const cm=getCM();cm[ym]={label:`${y}年${mns[m-1]}`,days};LS.set('months',cm);
  closeSP();renderCal();alert(`${y}年${mns[m-1]}を追加しました！`);
}
function delM(k){if(!confirm('削除しますか？'))return;const c=getCM();delete c[k];LS.set('months',c);renderCal();renderML();}
function resetAll(){if(!confirm('すべての記録を削除しますか？'))return;['done','voicy'].forEach(k=>localStorage.removeItem('bky_'+k));renderCal();alert('リセットしました');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
renderCal();renderVC();
setTimeout(fixToolbar,100);
window.addEventListener('resize',fixToolbar);
</script>
